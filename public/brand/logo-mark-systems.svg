<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="AISA systems mark">
  <defs><linearGradient id="aisaSys" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2EE6A6"/><stop offset="1" stop-color="#11D38B"/></linearGradient></defs>
  <!-- Secondary "systems" mark: constellation triangle with a centre-to-top spine. Use at >=40px. -->
  <path d="M50 15 L84 85 L16 85 Z" fill="none" stroke="url(#aisaSys)" stroke-width="3.5" stroke-linejoin="round" opacity="0.85"/>
  <path d="M50 58 L50 15" fill="none" stroke="url(#aisaSys)" stroke-width="5.5" stroke-linecap="round"/>
  <g fill="url(#aisaSys)">
    <circle cx="50" cy="15" r="6.5"/>
    <circle cx="84" cy="85" r="6.5"/>
    <circle cx="16" cy="85" r="6.5"/>
    <circle cx="50" cy="58" r="5.5"/>
    <circle cx="33" cy="50" r="3.5"/>
    <circle cx="67" cy="50" r="3.5"/>
    <circle cx="50" cy="85" r="3.5"/>
  </g>
</svg>
