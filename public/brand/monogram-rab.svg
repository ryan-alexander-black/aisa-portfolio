<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="RAB monogram">
  <defs>
    <linearGradient id="aisaGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2EE6A6"/>
      <stop offset="1" stop-color="#11D38B"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100" height="100" rx="24" fill="#0A0F0D"/>
  <!-- RAB set in the display face. For pixel-perfect final assets, outline this text to paths. -->
  <text x="50" y="50" dominant-baseline="central" text-anchor="middle"
        font-family="'Sora', ui-sans-serif, system-ui, sans-serif"
        font-size="42" font-weight="800" letter-spacing="1"
        fill="url(#aisaGreen)">RAB</text>
</svg>
