<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 132" width="560" height="132" role="img" aria-label="Ryan Alexander Black — AI Solutions Architect" style="color:#0A0F0D">
  <defs>
    <linearGradient id="aisaGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2EE6A6"/>
      <stop offset="1" stop-color="#11D38B"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(8 30) scale(0.72)">
