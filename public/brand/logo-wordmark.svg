    <g fill="url(#aisaGreen)">
      <circle cx="50" cy="16" r="9"/>
      <circle cx="18" cy="84" r="9"/>
      <circle cx="82" cy="84" r="9"/>
    </g>
  </g>

  <!-- Wordmark (currentColor adapts to light/dark when inlined; defaults to ink on light) -->
  <text x="104" y="64" font-family="'Sora', ui-sans-serif, system-ui, sans-serif"
        font-size="40" font-weight="700" letter-spacing="-0.4" fill="currentColor">Ryan Alexander Black</text>

  <!-- Tagline -->
  <text x="106" y="96" font-family="'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="13.5" font-weight="600" letter-spacing="3.4" fill="#047857">AI SOLUTIONS ARCHITECT</text>
</svg>
